# Supabase project configuration
# Reference: https://supabase.com/docs/guides/local-development/cli/config

[project]
# id = "your-project-ref"   # set via CLI: supabase link --project-ref <ref>

# ──────────────────────────────────────────────────────────────────────────────
# Edge Function settings
# verify_jwt = true  (default) — require a valid Supabase JWT
# verify_jwt = false — function validates auth itself, or is public (webhooks)
# ──────────────────────────────────────────────────────────────────────────────

[functions.stripe-checkout]
verify_jwt = false   # JWT validated manually inside the function

[functions.stripe-webhook]
verify_jwt = false   # Public endpoint — secured by Stripe webhook signature

[functions.demand-router]
verify_jwt = false

[functions.whatsapp-attendant]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false

[functions.n8n-workflows]
verify_jwt = false

# ── Agentes de IA (Wave 1) ────────────────────────────────────────────────────
[functions.agent-suporte]
verify_jwt = false

[functions.agent-onboarding]
verify_jwt = false

# ── Agentes de IA (Wave 2 — Análise) ─────────────────────────────────────────
[functions.agent-funil]
verify_jwt = false

[functions.agent-metricas]
verify_jwt = false

[functions.agent-relatorios]
verify_jwt = false

# ── Agentes de IA (Wave 3 — Dados) ───────────────────────────────────────────
[functions.agent-financeiro]
verify_jwt = false

[functions.agent-escalas]
verify_jwt = false

[functions.agent-cadastro]
verify_jwt = false

# ── Agentes de IA (Wave 4 — Conteúdo) ────────────────────────────────────────
[functions.agent-conteudo]
verify_jwt = false

[functions.agent-proposta]
verify_jwt = false

# ── Agentes de IA (Wave 5 — Especializados) ──────────────────────────────────
[functions.agent-formacao]
verify_jwt = false

[functions.agent-missoes]
verify_jwt = false

# ── Infraestrutura de Batch ────────────────────────────────────────────────────
[functions.batch-resolve]
verify_jwt = false   # autenticado via bearer token do n8n, não JWT de usuário

# ── Landing Page — captação pública ───────────────────────────────────────────
[functions.stripe-checkout-public]
verify_jwt = false   # público — pastor ainda não tem conta

[functions.lead-capture]
verify_jwt = false   # público — pastor ainda não tem conta

[functions.visitor-capture]
verify_jwt = false   # público — visitante NÃO tem conta (Frente B QR Code)

[functions.church-public]
verify_jwt = false   # público — dados mínimos da church para landing de visitante

[functions.dispatch-person-event]
verify_jwt = false   # interno — autenticado via service_role Bearer pelo chamador

# ── Billing — Coupons (F3/F4/F5) ─────────────────────────────────────────────
[functions.coupons-stripe-sync]
verify_jwt = false   # JWT validado manualmente — admin only

[functions.coupon-validate]
verify_jwt = false   # Auth condicional: anônimo p/ landing, JWT p/ cockpit_assisted

# ── Auth — configurações de produção ─────────────────────────────────────────
[auth]
site_url = "https://ekthos-platform.vercel.app"
additional_redirect_urls = [
  "https://ekthos-platform.vercel.app/*",
  "https://ekthosai.com",
  "https://ekthosai.com/*",
  "https://www.ekthosai.com",
  "https://www.ekthosai.com/*"
]

# ── Email Templates ───────────────────────────────────────────────────────────
[auth.email.template.invite]
subject = "Bem-vindo ao Ekthos — sua igreja te espera"
content_path = "./supabase/templates/invite.html"
