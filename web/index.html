<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ekthos Church — CRM Pastoral com Inteligência Artificial</title>
    <meta name="description" content="Plataforma de gestão pastoral com IA para igrejas. Acompanhe membros, células, ministérios e automatize tarefas repetitivas em menos de 30 minutos." />
    <meta property="og:title" content="Igreja Gerando Vencedores — Piratininga, Niterói" />
    <meta property="og:description" content="A IGV é uma comunidade de fé em Piratininga, Niterói/RJ. Conheça nossos cultos, células e ministérios." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:image" content="https://mlqjywqnchilvgkbvicd.supabase.co/storage/v1/object/public/church-logos/igv-logo.jpg" />
    <meta name="twitter:image" content="https://mlqjywqnchilvgkbvicd.supabase.co/storage/v1/object/public/church-logos/igv-logo.jpg" />
    <link rel="icon" type="image/png" href="/icons/igv-icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/igv-apple-touch-icon.png" />
    <!-- iOS PWA: sem estas 3 tags o iPhone não instala em standalone (abre no Safari normal) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="IGV" />
    <!-- PWA IGV: manifest + theme-color -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D97706" />
    <!-- cache-bust: 2026-06-18 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && location.pathname.startsWith('/igv')) {
        navigator.serviceWorker.register('/sw.js', { scope: '/igv' }).catch(() => {})
      }
    </script>
  </body>
</html>
