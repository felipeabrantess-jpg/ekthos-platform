<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: sans-serif; }
    .row { display: flex; align-items: center; gap: 40px; padding: 32px 48px; border: 1px solid #eee; border-radius: 16px; }
    .dark-row { background: #07131F; }
    label { font-size: 12px; color: #999; text-align: center; margin-top: 8px; }
    .col { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

  <div class="row">
    <!-- Logo grande — fundo branco -->
    <div class="col">
      <svg width="240" height="72" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="3" x2="24" y2="3" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="0" x2="18" y2="40" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <line x1="0" y1="14" x2="36" y2="14" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <text x="44" y="40" font-family="'Nunito', sans-serif" font-size="40" font-weight="800" fill="#07131F">Ekthos</text>
        <text x="100" y="56" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="10" font-weight="700" letter-spacing="4" fill="#07131F" opacity="0.75">CHURCH</text>
      </svg>
      <label>Grande · fundo branco</label>
    </div>

    <!-- Logo pequena — navbar -->
    <div class="col">
      <svg width="140" height="42" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="3" x2="24" y2="3" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="0" x2="18" y2="40" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <line x1="0" y1="14" x2="36" y2="14" stroke="#07131F" stroke-width="4" stroke-linecap="round"/>
        <text x="44" y="40" font-family="'Nunito', sans-serif" font-size="40" font-weight="800" fill="#07131F">Ekthos</text>
        <text x="100" y="56" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="10" font-weight="700" letter-spacing="4" fill="#07131F" opacity="0.75">CHURCH</text>
      </svg>
      <label>Navbar (height=28)</label>
    </div>
  </div>

  <!-- Fundo escuro -->
  <div class="row dark-row">
    <div class="col">
      <svg width="240" height="72" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="3" x2="24" y2="3" stroke="#F5FAFF" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="0" x2="18" y2="40" stroke="#F5FAFF" stroke-width="4" stroke-linecap="round"/>
        <line x1="0" y1="14" x2="36" y2="14" stroke="#F5FAFF" stroke-width="4" stroke-linecap="round"/>
        <text x="44" y="40" font-family="'Nunito', sans-serif" font-size="40" font-weight="800" fill="#F5FAFF">Ekthos</text>
        <text x="100" y="56" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="10" font-weight="700" letter-spacing="4" fill="#F5FAFF" opacity="0.75">CHURCH</text>
      </svg>
      <label style="color:#555">Grande · fundo escuro</label>
    </div>
  </div>

</body>
</html>
