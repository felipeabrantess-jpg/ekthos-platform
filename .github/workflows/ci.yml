# CI — roda em todo PR aberto contra main ou staging
# Valida typecheck + build antes de qualquer merge
#
# Nota: sem cache de npm enquanto package-lock.json não estiver commitado.
# Para reativar: rodar `npm install` localmente, commitar package-lock.json
# e restaurar `cache: npm` + `cache-dependency-path: web/package-lock.json`.

name: CI

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  check:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
