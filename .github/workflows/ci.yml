# CI — roda em todo PR aberto contra main ou staging
# Build é obrigatório (bloqueia merge se falhar).
# Typecheck é advisory (mostra erros mas não bloqueia):
#   há 32 erros TS pré-existentes causados por database.types.ts
#   não seguir o formato public.Tables do supabase-js@2.43.
#   Ver: docs/product/vocabulario-vertical.md para contexto.
#   TODO: corrigir estrutura de Database em database.types.ts.

name: CI

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  check:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck (advisory)
        run: npm run typecheck
        continue-on-error: true  # 32 erros pré-existentes — não bloqueia merge

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
