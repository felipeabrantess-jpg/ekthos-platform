# Deploy Production — roda APENAS em push direto na branch main
# Publica no ambiente de produção da Vercel
#
# Fluxo esperado:
#   feature-branch → PR → staging → PR → main → produção
#
# Nunca fazer push direto em main. Usar PR de staging → main.
#
# Secrets necessários (os mesmos de deploy-staging.yml):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY

name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ekthos.com.br  # ajustar para a URL real do projeto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web
          vercel-args: --prod  # flag que marca como deploy de produção
